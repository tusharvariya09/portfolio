name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1 — Checkout your code
      - name: Checkout
        uses: actions/checkout@v4

      # 2 — Install .NET 8
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 3 — Publish the Blazor WASM app
      - name: Publish Blazor App
        run: dotnet publish -c Release -o release

      # 4 — Fix base href so assets load correctly on GitHub Pages
      #     Change "portfolio" to your exact GitHub repo name
      - name: Fix base href
        run: |
          REPO_NAME="TusharPortfolio"
          sed -i "s|<base href=\"/\" />|<base href=\"/${REPO_NAME}/\" />|g" release/wwwroot/index.html

      # 5 — Copy index.html → 404.html (fixes page-refresh blank screen)
      - name: Add 404.html
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      # 6 — Add .nojekyll so GitHub doesn't ignore _framework folder
      - name: Add .nojekyll
        run: touch release/wwwroot/.nojekyll

      # 7 — Deploy only the wwwroot folder to gh-pages branch
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: release/wwwroot
          force_orphan: true